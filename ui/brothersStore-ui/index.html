<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrothersStore | Online Furniture & Decor Store</title>
    <meta
      name="description"
      content="BrothersStore is an online store for furniture and home decor. Browse trending products, add to cart, and order with cash on delivery."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <meta property="og:site_name" content="BrothersStore" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BrothersStore | Online Furniture & Decor Store" />
    <meta
      property="og:description"
      content="Browse furniture and home decor products, add to cart, and order with cash on delivery."
    />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/bs_logo_hd.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BrothersStore | Online Furniture & Decor Store" />
    <meta
      name="twitter:description"
      content="Browse furniture and home decor products, add to cart, and order with cash on delivery."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/bs_logo_hd.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "BrothersStore",
        "url": "%VITE_SITE_URL%/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "%VITE_SITE_URL%/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
