substitutions:
  _AR_HOSTNAME: "asia-south1-docker.pkg.dev"
  _AR_REPOSITORY: "cloud-run-source-deploy"
  _DEPLOY_REGION: "asia-south1"
  _PLATFORM: "managed"
  _SERVICE_NAME: "brothersstore-api"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: "gcr.io/cloud-builders/docker"
    dir: "backend/BrothersStoreProductionBackend"
    args:
      - "build"
      - "-t"
      - "${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "--region"
      - "${_DEPLOY_REGION}"
      - "--platform"
      - "${_PLATFORM}"
      - "--quiet"

images:
  - "${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}"
